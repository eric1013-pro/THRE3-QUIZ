<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRE3 QUIZ</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* === 테마 변수 및 애니메이션 배경 === */
        :root {
            --bg-color1: #f5f7fa; --bg-color2: #c3cfe2; --bg-color3: #e0c3fc;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 15px 35px rgba(31, 38, 135, 0.15);
            --text-main: #2c3e50; --text-sub: #0984e3;
            --input-bg: rgba(255, 255, 255, 0.5);
            --btn-bg: linear-gradient(45deg, #0984e3, #74b9ff);
            --btn-hover: linear-gradient(45deg, #74b9ff, #0984e3);
            --btn-green: linear-gradient(45deg, #00b894, #55efc4);
            --btn-ox-default: rgba(200, 200, 200, 0.3);
            --btn-o: linear-gradient(45deg, #0984e3, #00cec9);
            --btn-x: linear-gradient(45deg, #d63031, #ff7675);
            --neon-shadow: 0 0 15px rgba(9, 132, 227, 0.4);
        }

        body.dark-theme {
            --bg-color1: #0f2027; --bg-color2: #203a43; --bg-color3: #2c5364;
            --glass-bg: rgba(16, 25, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            --text-main: #f1f2f6; --text-sub: #00d2d3;
            --input-bg: rgba(0, 0, 0, 0.4);
            --btn-bg: linear-gradient(45deg, #1e90ff, #00d2d3);
            --btn-hover: linear-gradient(45deg, #00d2d3, #1e90ff);
            --btn-green: linear-gradient(45deg, #10ac84, #1dd1a1);
            --btn-ox-default: rgba(50, 50, 50, 0.5);
            --btn-o: linear-gradient(45deg, #1e90ff, #00d2d3);
            --btn-x: linear-gradient(45deg, #ff4757, #ff6b81);
            --neon-shadow: 0 0 20px rgba(0, 210, 211, 0.5);
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            /* 살아 움직이는 배경 애니메이션 */
            background: linear-gradient(-45deg, var(--bg-color1), var(--bg-color2), var(--bg-color3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main); display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; transition: 0.5s ease; overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === 멋진 인트로 화면 === */
        #introScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease-in-out;
        }
        #introScreen h1 {
            font-family: 'Montserrat', sans-serif; font-weight: 900;
            color: white; font-size: 60px; letter-spacing: 20px;
            text-transform: uppercase;
            animation: glitch 1.5s infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 0 0 10px #fff, 0 0 20px #00d2d3; transform: scale(1); }
            50% { text-shadow: 0 0 30px #fff, 0 0 40px #ff4757; transform: scale(1.05); }
            100% { text-shadow: 0 0 10px #fff, 0 0 20px #00d2d3; transform: scale(1); }
        }

        /* === 글래스모피즘 디자인 고도화 === */
        .glass {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
            border-radius: 20px; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .glass:hover { box-shadow: var(--neon-shadow); }

        .container { padding: 40px 30px; width: 100%; max-width: 480px; position: relative; }
        
        #themeToggle {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border); color: var(--text-main); padding: 8px 15px;
            border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        #themeToggle:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        h1.title { font-family: 'Montserrat', sans-serif; font-size: 38px; letter-spacing: 4px; color: var(--text-sub); text-align: center; margin-top: 10px; margin-bottom: 5px;}
        h2, h3 { text-align: center; margin-top: 0; font-weight: 700; }
        .status { text-align: center; font-size: 14px; color: var(--text-main); opacity: 0.7; margin-bottom: 25px; font-weight: bold; }

        .box { padding: 30px 20px; margin-top: 20px; text-align: center; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input { 
            width: 100%; padding: 15px; margin-top: 10px; box-sizing: border-box; 
            border-radius: 12px; background: var(--input-bg); border: 2px solid transparent;
            color: var(--text-main); font-size: 16px; outline: none; transition: 0.3s; font-weight: 700;
        }
        input:focus { border-color: var(--text-sub); background: rgba(255,255,255,0.1); }

        button { 
            width: 100%; padding: 15px; margin-top: 20px; border-radius: 12px; border: none;
            background: var(--btn-bg); color: white; font-size: 18px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover { background: var(--btn-hover); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .btn-green { background: var(--btn-green); }
        
        /* O/X 버튼 전용 디자인 */
        .ox-container { display: flex; gap: 15px; margin-top: 15px; }
        .ox-btn { 
            font-size: 30px; padding: 20px; flex: 1; background: var(--btn-ox-default); 
            border-radius: 15px; color: rgba(255,255,255,0.7); font-family: 'Montserrat', sans-serif;
        }
        .ox-btn.selected-o { background: var(--btn-o); color: white; box-shadow: 0 0 20px rgba(0, 210, 211, 0.6); transform: scale(1.05); }
        .ox-btn.selected-x { background: var(--btn-x); color: white; box-shadow: 0 0 20px rgba(255, 71, 87, 0.6); transform: scale(1.05); }

        .hidden { display: none !important; }
        
        #scoreBoard { 
            display: flex; justify-content: space-around; align-items: center;
            font-size: 18px; font-weight: bold; padding: 20px; margin-bottom: 20px; 
        }
        .turn-badge { background: var(--text-sub); color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 13px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }

        /* === 커스텀 토스트 알림 (기본 alert 대체) === */
        #customToast {
            position: fixed; top: 30px; left: 50%; transform: translate(-50%, -20px);
            background: var(--text-sub); color: #fff; padding: 15px 30px; border-radius: 30px;
            font-weight: bold; font-size: 16px; z-index: 10000; opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #customToast.show { opacity: 1; transform: translate(-50%, 0); }

    </style>
</head>
<body class="dark-theme">

<div id="introScreen">
    <h1>THRE3RIC</h1>
</div>

<div id="customToast">알림 메시지</div>

<div id="mainContent" class="container glass hidden">
    <button id="themeToggle" onclick="toggleTheme()">🌓 라이트 모드</button>
    
    <h1 class="title">THRE3 QUIZ</h1>
    <div id="connectionStatus" class="status">인터넷 연결 중...</div>

    <div id="lobbyScreen" class="hidden">
        <div class="box glass">
            <h3 style="color: var(--text-sub);">방장으로 시작하기</h3>
            <button onclick="createRoom()" class="btn-green">새로운 방 만들기 🚀</button>
        </div>
        <div class="box glass">
            <h3 style="color: var(--text-sub);">참가자로 접속하기</h3>
            <input type="text" id="roomInput" placeholder="4자리 방 번호 입력" style="text-align: center; letter-spacing: 5px;">
            <button onclick="joinRoom()">방 접속하기 ⚡</button>
        </div>
    </div>

    <div id="waitingScreen" class="hidden box glass">
        <h3>방이 생성되었습니다!</h3>
        <p style="font-size: 15px; opacity: 0.8; margin-top:10px;">상대방에게 아래 번호를 알려주세요.</p>
        <h1 id="roomCodeDisplay" style="color: var(--text-sub); font-size: 55px; letter-spacing: 15px; margin: 25px 0; font-family: 'Montserrat', sans-serif;">----</h1>
        <div class="status" style="margin:0;">상대방 접속 대기 중... ⏳</div>
    </div>

    <div id="gameScreen" class="hidden">
        <div id="scoreBoard" class="glass">
            <div style="text-align: center;">내 점수<br><span id="myScore" style="color: #00d2d3; font-size: 24px;">0</span></div>
            <div id="turnDisplay" class="turn-badge"></div>
            <div style="text-align: center;">상대 점수<br><span id="opponentScore" style="color: #ff4757; font-size: 24px;">0</span></div>
        </div>

        <div id="askSection" class="box glass hidden">
            <h3>📝 <span id="myAskCountDisplay" style="color: var(--text-sub);">1</span>번째 문제 출제</h3>
            <input type="text" id="qInput" placeholder="O/X 문제를 입력하세요">
            <p style="margin-top: 20px; margin-bottom: 5px; font-weight: bold;">정답을 선택하세요</p>
            <div class="ox-container">
                <button class="ox-btn" id="selectO" onclick="selectSetAnswer('O')">O</button>
                <button class="ox-btn" id="selectX" onclick="selectSetAnswer('X')">X</button>
            </div>
            <button onclick="sendQuiz()" class="btn-green" style="margin-top: 25px;">문제 전송 📤</button>
        </div>

        <div id="answerSection" class="box glass hidden">
            <h3 style="color: var(--text-sub);">🤔 상대방의 문제</h3>
            <h2 id="currentQDisplay" style="word-break: keep-all; margin: 30px 0; line-height: 1.4;"></h2>
            <div class="ox-container">
                <button class="ox-btn" onclick="submitAnswer('O')">O</button>
                <button class="ox-btn" onclick="submitAnswer('X')">X</button>
            </div>
        </div>

        <div id="waitingActionSection" class="box glass hidden">
            <h3 id="waitingText" style="line-height: 1.6;">상대방을 기다리는 중... ⏳</h3>
        </div>
    </div>
</div>

<script>
    // === 화려한 알림창 (Toast) 함수 ===
    function showToast(message, bgColor = 'var(--text-sub)') {
        const toast = document.getElementById('customToast');
        toast.innerText = message;
        toast.style.background = bgColor;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    // === 인트로 & 테마 ===
    window.onload = () => {
        setTimeout(() => {
            const intro = document.getElementById('introScreen');
            intro.style.opacity = '0'; 
            setTimeout(() => {
                intro.classList.add('hidden'); 
                document.getElementById('mainContent').classList.remove('hidden'); 
                document.getElementById('connectionStatus').innerText = "온라인 상태 🟢";
                document.getElementById('lobbyScreen').classList.remove('hidden');
            }, 1000); 
        }, 2000); 
    };

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeToggle');
        if (body.classList.contains('dark-theme')) {
            body.classList.remove('dark-theme'); btn.innerText = '🌒 다크 모드';
        } else {
            body.classList.add('dark-theme'); btn.innerText = '🌓 라이트 모드';
        }
    }

    // === 게임 로직 ===
    let peer, conn; 
    let role = ''; 
    let isMyTurnToAsk = false; 
    let myAskCount = 0, oppAskCount = 0; 
    let myScore = 0, opponentScore = 0;
    let answerToSet = '', actualAnswer = ''; 

    function createRoom() {
        const randomCode = Math.floor(1000 + Math.random() * 9000).toString(); 
        peer = new Peer("thre3quiz-" + randomCode);

        peer.on('open', (id) => {
            role = 'host';
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('waitingScreen').classList.remove('hidden');
            document.getElementById('roomCodeDisplay').innerText = randomCode;
            document.getElementById('connectionStatus').innerText = "방장 (Host)";
        });

        peer.on('connection', (connection) => {
            conn = connection;
            isMyTurnToAsk = true; 
            setupConnectionLogic();
        });
    }

    function joinRoom() {
        const inputCode = document.getElementById('roomInput').value.trim();
        if(inputCode.length !== 4) return showToast("4자리 방 번호를 입력해주세요!", "#ff4757");

        peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('connectionStatus').innerText = "접속 중... 🔄";
            conn = peer.connect("thre3quiz-" + inputCode);
            
            conn.on('open', () => {
                role = 'guest';
                isMyTurnToAsk = false; 
                setupConnectionLogic();
            });
        });
    }

    function setupConnectionLogic() {
        document.getElementById('lobbyScreen').classList.add('hidden');
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        showToast("게임이 시작되었습니다! 🎉", "#00b894");
        updateUI();

        conn.on('data', (data) => {
            if(data.type === 'quiz') {
                document.getElementById('currentQDisplay').innerText = "Q. " + data.question;
                actualAnswer = data.answer;
                updateUI();
                showToast("상대방이 문제를 냈습니다!", "#0984e3");
            } 
            else if(data.type === 'turn_end') {
                opponentScore = data.newScore;
                document.getElementById('opponentScore').innerText = opponentScore;
                myAskCount++; 
                
                if (data.isCorrect) showToast("앗! 상대방이 정답을 맞췄습니다. 💦", "#ff4757");
                else showToast("상대방이 틀렸습니다! 나이스! 😆", "#00b894");

                isMyTurnToAsk = false; 
                setTimeout(updateUI, 1500); // 토스트 창 볼 시간 확보 후 화면 전환
            }
        });
    }

    function selectSetAnswer(ans) {
        answerToSet = ans;
        document.getElementById('selectO').classList.remove('selected-o');
        document.getElementById('selectX').classList.remove('selected-x');
        if(ans === 'O') document.getElementById('selectO').classList.add('selected-o');
        if(ans === 'X') document.getElementById('selectX').classList.add('selected-x');
    }

    function sendQuiz() {
        const q = document.getElementById('qInput').value.trim();
        if (!q || !answerToSet) return showToast("문제와 정답을 모두 선택해주세요!", "#ff4757");

        conn.send({ type: 'quiz', question: q, answer: answerToSet });

        document.getElementById('qInput').value = '';
        answerToSet = '';
        document.getElementById('selectO').classList.remove('selected-o');
        document.getElementById('selectX').classList.remove('selected-x');
        
        document.getElementById('askSection').classList.add('hidden');
        document.getElementById('waitingActionSection').classList.remove('hidden');
        document.getElementById('waitingText').innerText = "상대방이 고민 중입니다... 🤔";
    }

    function submitAnswer(myAnswer) {
        let isCorrect = false;
        if (myAnswer === actualAnswer) {
            showToast("🎉 정답입니다! +1점", "#00b894");
            myScore++;
            document.getElementById('myScore').innerText = myScore;
            isCorrect = true;
        } else {
            showToast("땡! 오답입니다. (정답: " + actualAnswer + ")", "#ff4757");
        }

        oppAskCount++; 
        conn.send({ type: 'turn_end', newScore: myScore, isCorrect: isCorrect });
        
        isMyTurnToAsk = true; 
        actualAnswer = '';
        setTimeout(updateUI, 1500); // 결과 확인 후 화면 전환
    }

    function updateUI() {
        if (myAskCount === 3 && oppAskCount === 3) {
            document.getElementById('askSection').classList.add('hidden');
            document.getElementById('answerSection').classList.add('hidden');
            document.getElementById('waitingActionSection').classList.remove('hidden');
            
            let resultText = myScore > opponentScore ? "🏆 완벽한 승리! 🏆" : (myScore === opponentScore ? "🤝 평화로운 무승부 🤝" : "😭 아쉬운 패배 😭");
            let resultColor = myScore > opponentScore ? "#00b894" : (myScore === opponentScore ? "#0984e3" : "#ff4757");
            
            document.getElementById('waitingText').innerHTML = `
                <span style="font-size:24px; color:${resultColor};">${resultText}</span><br><br>
                최종 스코어<br>나 <b style="font-size:20px;">${myScore}</b> : <b style="font-size:20px;">${opponentScore}</b> 상대
            `;
            document.getElementById('turnDisplay').innerText = "게임 종료 🏁";
            return;
        }

        if (isMyTurnToAsk) {
            document.getElementById('askSection').classList.remove('hidden');
            document.getElementById('answerSection').classList.add('hidden');
            document.getElementById('waitingActionSection').classList.add('hidden');
            document.getElementById('myAskCountDisplay').innerText = (myAskCount + 1);
            document.getElementById('turnDisplay').innerText = "내 출제 턴 📝";
        } else {
            document.getElementById('askSection').classList.add('hidden');
            if (actualAnswer) {
                document.getElementById('answerSection').classList.remove('hidden');
                document.getElementById('waitingActionSection').classList.add('hidden');
                document.getElementById('turnDisplay').innerText = "문제 푸는 턴 🤔";
            } else {
                document.getElementById('answerSection').classList.add('hidden');
                document.getElementById('waitingActionSection').classList.remove('hidden');
                document.getElementById('waitingText').innerText = "상대방이 문제를 만들고 있어요... ✍️";
                document.getElementById('turnDisplay').innerText = "상대 출제 턴 ⏳";
            }
        }
    }
</script>

</body>
</html>
